<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velior Group · CRM, Automation & AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/site.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="scripts/content.js"></script>
  <script type="text/babel" src="scripts/tweaks-panel.jsx"></script>
  <script type="text/babel" src="scripts/components.jsx"></script>
  <script type="text/babel" src="scripts/page-home.jsx"></script>
  <script type="text/babel" src="scripts/pages.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "density": "compact"
    }/*EDITMODE-END*/;

    function App() {
      const [route, setRoute] = useState("home");
      const [lang, setLang] = useState("en");
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

      const t = COPY[lang];

      // Update document language
      useEffect(() => {
        document.documentElement.lang = lang;
      }, [lang]);

      // Apply density to body
      useEffect(() => {
        document.body.dataset.density = tweaks.density;
      }, [tweaks.density]);

      // Hash-based routing
      useEffect(() => {
        const onHash = () => {
          const h = window.location.hash.replace("#", "");
          if (["home", "about", "services", "contact"].includes(h)) {
            setRoute(h);
            window.scrollTo({ top: 0 });
          }
        };
        window.addEventListener("hashchange", onHash);
        onHash();
        return () => window.removeEventListener("hashchange", onHash);
      }, []);

      const navigate = (r) => {
        setRoute(r);
        window.location.hash = r;
        window.scrollTo({ top: 0, behavior: "instant" });
      };

      let page = null;
      if (route === "home") page = <HomePage t={t} setRoute={navigate} />;
      else if (route === "about") page = <AboutPage t={t} setRoute={navigate} />;
      else if (route === "services") page = <ServicesPage t={t} setRoute={navigate} />;
      else if (route === "contact") page = <ContactPage t={t} />;

      return (
        <>
          <Nav route={route} setRoute={navigate} lang={lang} setLang={setLang} t={t} />
          <main data-screen-label={route}>{page}</main>
          <Footer t={t} setRoute={navigate} />

          <TweaksPanel title="Tweaks">
            <TweakSection title="Layout">
              <TweakRadio
                label="Density"
                value={tweaks.density}
                options={[
                  { value: "compact", label: "Compact" },
                  { value: "comfortable", label: "Comfort" },
                  { value: "spacious", label: "Spacious" }
                ]}
                onChange={(v) => setTweak("density", v)}
              />
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
