<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Velior Group · Print</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/site.css" />
  <style>
    /* Force colors to print */
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

    /* Disable animations / interactivity */
    *, *::before, *::after {
      animation: none !important;
      transition: none !important;
    }

    /* Hide tweaks panel & nav (print doesn't need it) */
    .tweaks-panel, .twk-root, .twk-toggle, .nav { display: none !important; }

    body { background: var(--bg-1) !important; }

    /* Each page section starts on a new printed page */
    .print-page {
      break-before: page;
      page-break-before: always;
    }
    .print-page:first-child {
      break-before: auto;
      page-break-before: auto;
    }

    /* Avoid breaking inside cards */
    .service-card, .partner-stat, .hero-stat, .testimonial-card,
    .case-card, .process-step, .footer-col, .contact-form-card {
      break-inside: avoid;
      page-break-inside: avoid;
    }

    /* Marquees → static */
    .tech-marquee { animation: none !important; transform: none !important; flex-wrap: wrap; justify-content: center; }
    .tech-marquee-wrap { -webkit-mask-image: none !important; mask-image: none !important; }

    /* Hero: don't force 100vh in print */
    .hero { min-height: auto !important; padding: 60px 0 !important; }

    @media print {
      @page { size: A4; margin: 12mm; }
      html, body { background: #000020 !important; }
      .hero { padding: 40px 0 !important; }
      .section { padding: 40px 0 !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="scripts/content.js"></script>
  <script type="text/babel" src="scripts/tweaks-panel.jsx"></script>
  <script type="text/babel" src="scripts/components.jsx"></script>
  <script type="text/babel" src="scripts/page-home.jsx"></script>
  <script type="text/babel" src="scripts/pages.jsx"></script>

  <script type="text/babel" data-presets="env,react">
    const t = COPY.en;
    const noop = () => {};

    function PrintApp() {
      return (
        <>
          <div className="print-page">
            <HomePage t={t} setRoute={noop} />
          </div>
          <div className="print-page">
            <AboutPage t={t} setRoute={noop} />
          </div>
          <div className="print-page">
            <ServicesPage t={t} setRoute={noop} />
          </div>
          <div className="print-page">
            <ContactPage t={t} />
          </div>
          <Footer t={t} setRoute={noop} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<PrintApp />);

    // Auto-print: wait for fonts + Babel transforms + a small buffer
    (async () => {
      try {
        if (document.fonts && document.fonts.ready) {
          await document.fonts.ready;
        }
      } catch (e) {}
      // Wait an additional moment for React render + image loads
      setTimeout(() => { window.print(); }, 1200);
    })();
  </script>
</body>
</html>
