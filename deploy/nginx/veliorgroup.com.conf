server {
    listen 80;
    listen [::]:80;
    server_name veliorgroup.com www.veliorgroup.com;

    # certbot --nginx will rewrite this to redirect to HTTPS.

    error_page 502 503 504 =200 /fallback.html;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_intercept_errors on;
        proxy_read_timeout 60s;
    }

    # Static fallback when the Node app is down (during a redeploy).
    location = /fallback.html {
        root /home/web/veliorgroup-static;
        internal;
    }

    # Long-cache hashed Next.js assets.
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Drop noisy bot probes.
    location ~* /\.(?:env|git|svn|hg|DS_Store) {
        deny all;
        return 404;
    }

    # Compression.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml
        font/woff font/woff2;
}
